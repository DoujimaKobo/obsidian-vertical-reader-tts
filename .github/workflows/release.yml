name: Release Obsidian plugin

# Builds the plugin and attaches the release artifacts whenever a version tag
# is pushed. Tag with the plain version number (no leading "v"), e.g.:
#
#   npm version patch      # bumps package.json + manifest.json + versions.json
#   git push && git push --tags
#
on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title="$TAG" \
            --notes "Release $TAG" \
            main.js manifest.json styles.css
